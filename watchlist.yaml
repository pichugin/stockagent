# StockAgent watchlist.
# Each symbol routes to a provider based on its exchange:
#   US  -> Alpaca (if ALPACA_KEY/SECRET set) else yahoo-finance2 fallback
#   TSX -> yahoo-finance2  (use the Yahoo ".TO" suffix in `symbol`)

# Optional user preferences. cadBias is a parsed-and-validated stub for the
# later signal layer (range [-1, 1]; 0 neutral, >0 favours CAD). Nothing acts
# on it yet.
preferences:
  cadBias: 0

# Optional signal-engine tuning. Every key below shows its default; omit the
# whole block (or any key) to use defaults. See README "Signals & alerts".
# signals:
#   rsi:            { period: 14, overbought: 70, oversold: 30 }
#   macd:           { fastPeriod: 12, slowPeriod: 26, signalPeriod: 9 }
#   movingAverages: { shortPeriod: 50, longPeriod: 200 }
#   bollinger:      { period: 20, stdDev: 2 }
#   pnl:            { gainPct: 20, lossPct: 15 }
#   concentration:  { overweightPct: 25 }
#   context:        { nearHighPct: 90, nearLowPct: 10 }
#   rollup:         { overboughtCount: 2 }

# Optional Phase-5 notification discipline (native macOS pushes for actionable
# signals only). Keys below show defaults; omit the block to use them. See
# README "Notifications".
# notifications:
#   enabled: true                  # master switch for native pushes
#   maxPerWindow: 5                # max notifications per window…
#   windowMinutes: 10              # …over this many minutes (else coalesce to one)
#   quietHoursOutsideMarket: true  # suppress non-threshold pushes when markets closed

symbols:
  - symbol: AAPL
    exchange: US
    currency: USD
  - symbol: NVDA
    exchange: US
    currency: USD
  - symbol: SHOP.TO
    exchange: TSX
    currency: CAD
  - symbol: TD.TO
    exchange: TSX
    currency: CAD
